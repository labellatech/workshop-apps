apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

commonLabels:
  env: dev

images:
  - name: inventory-service
    newName: ghcr.io/zawthanoo/inventory-service
    newTag: 1.0.0-8-07fb7e

replicas:
  - name: inventory-service
    count: 1

configMapGenerator:
  - name: inventory-service-config
    envs:
      - .env

secretGenerator:
  - name: inventory-service-secret
    envs:
      - .secret.env

generatorOptions:
  disableNameSuffixHash: true
