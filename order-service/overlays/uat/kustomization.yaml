apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uat

resources:
  - ../../base

commonLabels:
  env: uat

images:
  - name: order-service
    newName: ghcr.io/zawthanoo/order-service
    newTag: 1.0.0-8-07fb7e

replicas:
  - name: order-service
    count: 2

configMapGenerator:
  - name: order-service-config
    envs:
      - .env

secretGenerator:
  - name: order-service-secret
    envs:
      - .secret.env

generatorOptions:
  disableNameSuffixHash: true
